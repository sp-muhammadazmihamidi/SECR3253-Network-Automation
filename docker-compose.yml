version: '3.8'
services:
  control_node:
    image: ubuntu:latest
    container_name: control_node
    volumes:
      - .:/workspace
    working_dir: /workspace
    command: /bin/bash -c "apt-get update && apt-get install -y ansible openssh-client && tail -f /dev/null"
  managed_node:
    image: radwebhosting/centos7-ssh
    container_name: managed_node
    ports:
      - "2222:22"

