version: '2.2'
services:
  control_node:
    image: ubuntu:latest
    container_name: control_node
    volumes:
      - .:/workspace
    working_dir: /workspace
    command: /bin/bash -c "apt-get update && apt-get install -y ansible openssh-client && tail -f /dev/null"
  managed_node:
    image: linuxserver/openssh-server:latest
    container_name: managed_node
    ports:
      - "2222:22"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Kuala_Lumpur
      - USER_PASSWORD=root

